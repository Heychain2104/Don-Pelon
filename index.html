<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Canal</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    color: #000;
  }

  /* HEADER */
  header {
    background: linear-gradient(90deg, #FFD700, #FFF8DC);
    padding: 60px 20px;
    text-align: center;
  }

  header h1 {
    font-size: 50px;
    margin: 0;
  }

  header p {
    font-size: 18px;
    margin-top: 10px;
  }

  /* BOTÓN */
  .btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: #FFD700;
    color: black;
    text-decoration: none;
    font-weight: bold;
    border-radius: 10px;
    transition: 0.3s;
  }

  .btn:hover {
    background: black;
    color: #FFD700;
  }

  /* SECCIÓN IMÁGENES */
  .galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 40px;
  }

  .card {
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  }

  .card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
  }

  .card p {
    padding: 10px;
    text-align: center;
    font-weight: bold;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 20px;
    background: #FFF8DC;
  }

</style>
</head>

<body>

<header>
  <h1>🔥 Mi Canal Creativo</h1>
  <p>Gaming, edits, ideas y contenido que explota la imaginación</p>
  <a class="btn" href="#">Ver Canal</a>
</header>

<section class="galeria">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e" alt="">
    <p>Edits de GTA</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1552820728-8b83bb6b773f" alt="">
    <p>Gameplay intenso</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420" alt="">
    <p>Momentos virales</p>
  </div>

</section>

<footer>
  © 2026 Mi Canal - Hecho con creatividad
</footer>

</body>
</html>

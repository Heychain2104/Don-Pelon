<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Pelon - Juegos</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 30px;
  background: linear-gradient(90deg, #FFD700, #FFF8DC);
  position: sticky;
  top: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.logo img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 40px;
}

.game {
  position: relative;
  cursor: pointer;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.game:hover {
  transform: scale(1.05);
}

.game img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 10px;
  opacity: 0;
  transition: 0.3s;
  text-align: center;
}

.game:hover .overlay {
  opacity: 1;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 999;
}

/* TOP BAR MODAL */
.modal-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #FFD700;
  padding: 10px;
}

.modal-bar button {
  padding: 8px 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: white;
  border-radius: 8px;
}

.modal-bar button:hover {
  background: black;
  color: #FFD700;
}

/* IFRAME */
.modal-content {
  width: 100%;
  height: calc(100% - 50px);
}

.modal-content iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo" onclick="window.location.href='index.html'">
    <img src="https://yt3.ggpht.com/zTZq34dWGLHyGmBJXgzDQ3xcJhF9otRtmznaN7KUPF7MpBwkEkzhGd1_Lj-OvSCJpyd9xWoJXgg=s600-c-k-c0x00ffffff-no-rj-rp-mo">
    <h1>Don Pelon</h1>
  </div>
</header>

<!-- GRID -->
<div class="grid">

  <div class="game" onclick="openGame('https://scratch.mit.edu/projects/108566184/embed')">
    <img src="https://uploads.scratch.mit.edu/get_image/project/108566184_480x360.png">
    <div class="overlay">Scratch Game</div>
  </div>

  <div class="game" onclick="openGame('https://scratch.mit.edu/projects/10128407/embed')">
    <img src="https://uploads.scratch.mit.edu/get_image/project/10128407_480x360.png">
    <div class="overlay">Paper Minecraft</div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

  <!-- TOP BAR -->
  <div class="modal-bar">
    <button onclick="closeModal()">❌ Cerrar</button>
    <button onclick="closeModal()">🏠 Inicio</button>
    <button onclick="closeModal()">🎮 Juegos</button>
  </div>

  <!-- GAME -->
  <div class="modal-content">
    <iframe id="gameFrame"></iframe>
  </div>

</div>

<script>
function openGame(url) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("gameFrame").src = url;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("gameFrame").src = "";
}
</script>

</body>
</html>

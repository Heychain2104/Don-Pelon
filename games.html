<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Pelon - Juegos</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    color: #000;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 30px;
    background: linear-gradient(90deg, #FFD700, #FFF8DC);
    position: sticky;
    top: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }

  .logo img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
  }

  .logo h1 {
    font-size: 20px;
    margin: 0;
  }

  /* TITULO */
  .title {
    text-align: center;
    padding: 60px 20px 20px;
  }

  .title h2 {
    font-size: 40px;
  }

  .title p {
    font-size: 18px;
    opacity: 0.8;
  }

  /* GRID DE JUEGOS (PREPARADO) */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
  }

  .game-card {
    background: #FFF8DC;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
    cursor: pointer;
  }

  .game-card:hover {
    transform: translateY(-8px);
    background: #FFD700;
  }

  .game-card h3 {
    margin: 10px 0;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 20px;
    background: #FFD700;
    margin-top: 40px;
  }

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo" onclick="window.location.href='index.html'">
    <img src="https://yt3.ggpht.com/zTZq34dWGLHyGmBJXgzDQ3xcJhF9otRtmznaN7KUPF7MpBwkEkzhGd1_Lj-OvSCJpyd9xWoJXgg=s600-c-k-c0x00ffffff-no-rj-rp-mo">
    <h1>Don Pelon</h1>
  </div>
</header>

<!-- TITLE -->
<section class="title">
  <h2>🎮 Juegos</h2>
  <p>Aquí empezaremos a construir el hub de juegos del canal</p>
</section>

<!-- GAMES GRID -->
<section class="games-grid">

  <div class="game-card">
    <h3>🧪 Próximamente</h3>
    <p>Primer juego embebido</p>
  </div>

  <div class="game-card">
    <h3>🚀 Próximamente</h3>
    <p>Segundo juego</p>
  </div>

  <div class="game-card">
    <h3>🎯 Próximamente</h3>
    <p>Tercer juego</p>
  </div>

</section>

<!-- FOOTER -->
<footer>
  © 2026 Don Pelon - Juegos
</footer>

</body>
</html>
